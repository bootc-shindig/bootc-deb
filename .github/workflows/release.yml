name: Release Debian Package
permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install APT Repository Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build .deb
        run: |
          DOCKER_BUILDKIT=1 docker build -f pkgs/bootc.Containerfile --output type=local,dest=./docker-output .
          
          mkdir -p ./apt-repo/debian/dists/stable/main/binary-amd64
          mkdir -p ./apt-repo/debian/pool/main
          
          mv ./docker-output/*.deb ./apt-repo/debian/pool/main/

          cd ./apt-repo/debian
          dpkg-scanpackages pool/main /dev/null > dists/stable/main/binary-amd64/Packages
          gzip -9k -f dists/stable/main/binary-amd64/Packages
          
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="jumpyvi" \
            -o APT::FTPArchive::Release::Label="Bootc-Deb" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64" \
            -o APT::FTPArchive::Release::Components="main" \
            release dists/stable > dists/stable/Release

          gpg --yes --clearsign --digest-algo SHA256 --local-user "${{ secrets.GPG_EMAIL }}" -o dists/stable/InRelease dists/stable/Release
          gpg --yes -abs --digest-algo SHA256 --local-user "${{ secrets.GPG_EMAIL }}" -o dists/stable/Release.gpg dists/stable/Release

      - name: Deploy to GitHub Pages
        uses: jamesives/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: apt-repo